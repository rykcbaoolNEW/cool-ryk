<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>Scramjet</title>

		<link rel="shortcut icon" content="favicon.webp" />
	
		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>
		
		<link rel="stylesheet" href="index.css" />

	</head>


	<div id="sidebar" class="sidebar">
		<div class="sidebar-header">
			<h3>Menu</h3>
		</div>

		<div class="sidebar-section">
			<button onclick="location.href='/index.html'">Home</button>
			<button onclick="location.href='/games.html'">Games</button>
			<button onclick="location.href='/credits.html'">Credits</button>
		</div>
	</div>

	<body>
	<div class="bg"></div>

	<div class="container">
		<img class="logo" src="logo.png" alt="ryk logo">

		<form id="sj-form">
			<input
					id="sj-address"
					type="text"
					placeholder="Search or enter a URL"
					autocomplete="false"
			/>
		</form>

		<div class="quick-links">
			<button onclick="document.getElementById('sj-address').value='youtube.com'; document.getElementById('sj-form').dispatchEvent(new Event('submit'));">YouTube</button>
			<button onclick="document.getElementById('sj-address').value='tiktok.com'; document.getElementById('sj-form').dispatchEvent(new Event('submit'));">TikTok</button>
			<button onclick="document.getElementById('sj-address').value='google.com'; document.getElementById('sj-form').dispatchEvent(new Event('submit'));">Google</button>
		</div>

		<p id="sj-error"></p>
		<p> Press ` for sidebar</p>
	</div>
	<div id="bottom-box" class="bottom-box">
		<button id="back-btn">←</button>
		<button id="reload-btn">⟳</button>

		<input id="bottom-url" type="text" />

		<button id="go-btn">Go</button>
	</div>
	</body>
	<script src="register-sw.js" defer></script>
	<script src="search.js" defer></script>
	<script src="index.js" defer></script>
</html>
